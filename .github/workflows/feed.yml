name: Archivist feed discovery

# Weekly discovery: poll the feeds in profile/feeds.md, append new candidate URLs to the
# ingest queue (raw/urls.md), and open/update a PR. Discovery only — authoring the pages
# stays a separate /ingest step (assign the PR to Copilot, or run /ingest locally).
#
# Setup: this workflow opens a PR, so enable
#   Settings → Actions → General → Workflow permissions →
#   "Allow GitHub Actions to create and approve pull requests".
# Feed fetching is also subject to the Copilot firewall allowlist (see AGENTS.md).

on:
  schedule:
    - cron: '0 13 * * 1' # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      - name: Poll feeds
        id: feed
        run: |
          node scripts/feed.js > feed-report.md 2> feed.err || true
          echo "new=$(grep -oE 'FEED_NEW=[0-9]+' feed.err | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Open or update the discovery PR
        if: steps.feed.outputs.new != '0' && steps.feed.outputs.new != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          BRANCH="feed/discovery"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add raw/urls.md
          git commit -m "chore(feed): queue ${{ steps.feed.outputs.new }} new discovered source(s)" \
            -m "Co-authored-by: Copilot App <223556219+Copilot@users.noreply.github.com>"
          git push -f origin "$BRANCH"
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --body-file feed-report.md
          else
            gh pr create --base "${{ github.event.repository.default_branch }}" --head "$BRANCH" \
              --title "Feed discovery: ${{ steps.feed.outputs.new }} new source(s) to ingest" \
              --body-file feed-report.md
          fi
