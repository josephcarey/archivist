<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>archivist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3a7bd5;

      /* dark mode theme colors */
      --dark-base-background: #222;
      --dark-base-color: #bbc0c4;
      --dark-theme-color: var(--theme-color, #42b983);
      --dark-code-color: var(--dark-color);
      --dark-heading-color: var(--dark-theme-color);
      --dark-cover-background: #000000a8;
      --dark-code-background: #303030;
      --dark-tip-background: #2c0000;
      --dark-warn-background: #005842;
    }
    .sidebar-toggle { color: var(--theme-color); }
    nav.app-nav { display: none; }
    body { position: relative; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'archivist',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search wiki...',
        noData: 'No results.',
        depth: 4
      },
      plugins: [
        // Strip YAML frontmatter (--- ... ---) before rendering
        function(hook) {
          hook.beforeEach(function(content) {
            return content.replace(/^---[\s\S]*?---\n?/, '');
          });
        },
        // Render mermaid diagrams after each page renders
        function(hook) {
          hook.doneEach(function() {
            if (window.mermaid) {
              try {
                window.mermaid.run({ querySelector: '.mermaid' });
              } catch (e) { /* no-op */ }
            }
          });
        }
      ],
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: false, theme: 'default' });
    }
  </script>

  <!-- plugins -->
  <script src="./plugins/docsify-display-controls.js"></script>

</body>
</html>
